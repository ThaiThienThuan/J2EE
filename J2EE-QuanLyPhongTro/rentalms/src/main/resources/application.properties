# ===== SERVER =====
# Render / PaaS thuong chi set PORT; local co the dung SERVER_PORT.
server.port=${PORT:${SERVER_PORT:8080}}

# ===== H2 DATABASE (chay khong can cai dat) =====
# spring.datasource.url=jdbc:h2:mem:rentalms;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
# ===== MySQL =====
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/rentalms?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
# Hikari: tranh connection stale sau idle (MySQL wait_timeout / proxy cloud). max-lifetime nen < wait_timeout cua server.
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:10}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:9m}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:5m}
spring.datasource.hikari.keepalive-time=${HIKARI_KEEPALIVE:2m}

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ===== JWT =====
app.jwt.secret=${APP_JWT_SECRET:RentalMSSecretKey2024VeryLongSecretKeyForJWTGeneration123456789}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

# ===== JACKSON =====
spring.jackson.serialization.write-dates-as-timestamps=false

# ===== UPLOAD =====
app.upload.dir=${APP_UPLOAD_DIR:./uploads}
spring.servlet.multipart.max-file-size=${APP_UPLOAD_MAX_FILE_SIZE:50MB}
spring.servlet.multipart.max-request-size=${APP_UPLOAD_MAX_REQUEST_SIZE:50MB}

# ===== CLOUDINARY =====
app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
app.cloudinary.api-key=${CLOUDINARY_API_KEY:}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# ===== MOMO =====
app.momo.partner-code=${MOMO_PARTNER_CODE:}
app.momo.access-key=${MOMO_ACCESS_KEY:}
app.momo.secret-key=${MOMO_SECRET_KEY:}
app.momo.endpoint=${MOMO_ENDPOINT:https://test-payment.momo.vn/v2/gateway/api/create}
app.momo.redirect-url=${MOMO_REDIRECT_URL:http://localhost:3000/payment/momo/callback}
app.momo.ipn-url=${MOMO_IPN_URL:http://localhost:8080/api/v1/payments/momo/ipn}

# ===== CORS (tùy chọn — mọi https://*.vercel.app đã được code cho phép) =====
# Thêm domain riêng: APP_CORS_ALLOWED_ORIGIN_PATTERNS=https://app.ban.com
# Pattern có *: https://*.example.com — cách nhau bằng dấu phẩy
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:}

# ===== LOGGING =====
logging.level.com.rentalms=${APP_LOG_LEVEL:INFO}
logging.level.org.springframework.security=INFO
